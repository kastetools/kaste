name: Kaste
options:
  bundleIdPrefix: app.kaste
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "1.1.30"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  Kaste:
    type: application
    platform: macOS
    sources:
      - path: Kaste
    resources:
      - path: Kaste/Resources
    info:
      path: Kaste/Info.plist
      properties:
        CFBundleName: Kaste
        CFBundleDisplayName: Kaste
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: false
        NSHumanReadableCopyright: "© 2026 Kaste"
        NSAppleEventsUsageDescription: "Kaste needs Accessibility access to paste into the active app."
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.kaste.Kaste
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
